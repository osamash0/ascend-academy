name: ascend-academy-prod

# Production stack for shared university server deployment.
# See docker-compose.yml for local development usage.

networks:
  ascend_net:
    driver: bridge

services:

  # ── App cache (evictable) ─────────────────────────────────────────────────
  # Auth-token / parse / embedding caches. allkeys-lru is SAFE here: every entry
  # is a rebuildable cache value. This Redis must NOT host the job queue.
  redis:
    image: redis:7-alpine
    networks:
      - ascend_net
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Job queue broker (durable) ────────────────────────────────────────────
  # Arq broker + results + parse SSE pub/sub. noeviction + AOF so an enqueued
  # parse job is NEVER dropped under memory pressure. Kept small — the queue
  # holds job payloads, not bulk data.
  redis-queue:
    image: redis:7-alpine
    networks:
      - ascend_net
    volumes:
      - redis_queue_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 160M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LLM gateway ────────────────────────────────────────────────────────────
  # NOTE: LiteLLM is optional.
  # It acts as a gateway to external LLM providers (Groq, Gemini, OpenAI, etc.).
  # If the university server hosts its own LLM (e.g. via vLLM or an
  # OpenAI-compatible endpoint), LiteLLM can be removed entirely and the
  # LITELLM_BASE_URL variable in the api and worker services should point
  # directly to the university-hosted LLM endpoint instead.
  # In that case, no external LLM API keys would be needed.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    entrypoint: ["sh", "-c", "unset DATABASE_URL && exec docker/prod_entrypoint.sh \"$$@\"", "--"]
    networks:
      - ascend_net
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    env_file:
      - .env
    environment:
      - DISABLE_SCHEMA_UPDATE=true
      - STORE_MODEL_IN_DB=False
      - LITELLM_TELEMETRY=False
      - DATABASE_URL=
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Cap RAM/CPU so a LiteLLM leak/spike can't OOM the 4 GB box or
          # starve the API on 2 vCPU. Was previously unbounded.
          memory: 1G
          cpus: "0.75"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── FastAPI API server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - ascend_net
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
      - ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    # Single uvicorn worker in prod: two workers each load FastAPI + PyMuPDF +
    # Pillow + LLM clients and can jointly breach the 512M cap → OOM kill on the
    # 4 GB box. On 2 vCPU a 2nd worker adds little throughput anyway.
    #
    # Roadmap P2-2 update: this is no longer ALSO propping up the nudge
    # scheduler's lack of leader election — that job moved off in-process
    # APScheduler onto an Arq cron job in the `worker` service below (which
    # dedupes across replicas natively), so it's no longer a reason this
    # can't be 2. The memory/OOM rationale above is still real and still the
    # reason it's pinned — this is a memory-budget call, not automated here.
    # TODO(deploy-risk): raising --workers still needs its own headroom/OOM
    # sign-off; ~359 call sites across the API remain on sync Supabase REST
    # calls run in the threadpool (see docs/ROADMAP_10X_FOUNDATION.md §7), so
    # a 2nd worker roughly doubles the thread-pool ceiling but does not by
    # itself fix the underlying sync-I/O-in-threadpool architecture.
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      # Probe /health/ready — verifies DB + both Redis instances, not just that
      # the process is up. curl -f fails on the 503 the endpoint returns when a
      # dependency is down, so the frontend gate (depends_on) won't open against
      # an API that would 500 on every real route. DB is only critical when
      # DATABASE_URL is set, so REST-only deploys still pass.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend served by nginx ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_LAZY_PDF_IMPORT: ${VITE_LAZY_PDF_IMPORT:-false}
        VITE_ANON_SALT: ${VITE_ANON_SALT:-learnstation-analytics-2026}
    platform: linux/amd64
    networks:
      - ascend_net
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Arq pipeline worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - ascend_net
    command: python -m arq backend.workers.arq_worker.WorkerSettings
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          # Cap CPU so a PyMuPDF/tiktoken-bound parse can't saturate both cores
          # and stall the API on the 2 vCPU box.
          cpus: "1.0"
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_healthy


volumes:
  redis_data:
  redis_queue_data:

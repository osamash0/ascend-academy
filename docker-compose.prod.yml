name: ascend-academy-prod

# Production stack for shared university server deployment.
# See docker-compose.yml for local development usage.

networks:
  ascend_net:
    driver: bridge

services:

  # ── Message broker + job queue ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - ascend_net
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LLM gateway ────────────────────────────────────────────────────────────
  # NOTE: LiteLLM is optional.
  # It acts as a gateway to external LLM providers (Groq, Gemini, OpenAI, etc.).
  # If the university server hosts its own LLM (e.g. via vLLM or an
  # OpenAI-compatible endpoint), LiteLLM can be removed entirely and the
  # LITELLM_BASE_URL variable in the api and worker services should point
  # directly to the university-hosted LLM endpoint instead.
  # In that case, no external LLM API keys would be needed.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    networks:
      - ascend_net
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --detailed_debug
    env_file:
      - .env
    environment:
      - DISABLE_SCHEMA_UPDATE=true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── FastAPI API server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - ascend_net
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - LITELLM_BASE_URL=http://litellm:4000
      - ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React frontend served by nginx ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_LAZY_PDF_IMPORT: ${VITE_LAZY_PDF_IMPORT:-false}
        VITE_ANON_SALT: ${VITE_ANON_SALT:-learnstation-analytics-2026}
    platform: linux/amd64
    networks:
      - ascend_net
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Arq pipeline worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - ascend_net
    command: python -m arq backend.workers.arq_worker.WorkerSettings
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - LITELLM_BASE_URL=http://litellm:4000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_started


volumes:
  redis_data:

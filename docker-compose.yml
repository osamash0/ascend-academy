# Local development stack — frontend + backend + infrastructure.
#
# First-time setup:
#   cp .env.example .env   # then fill in the required values
#
# Build and start all services:
#   docker compose up --build
#
# Infrastructure only (redis + litellm):
#   docker compose up redis litellm -d
#
# Worker logs:
#   docker compose logs -f worker
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000
#
# SECURITY: every published port is bound to 127.0.0.1 so nothing is reachable
# from the host's public IP / 0.0.0.0. Reach these services from another machine
# only via the university network or VPN — never publish them publicly without
# prior approval. Redis additionally requires REDIS_PASSWORD (set it in .env).

services:

  # ── App cache (evictable) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env} --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Job queue broker (durable) ────────────────────────────────────────────
  # Mirrors prod: Arq broker + results + parse SSE pub/sub, noeviction + AOF.
  # Bound to 6380 on the host so you can inspect queue keys separately.
  redis-queue:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_queue_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env} --maxmemory-policy noeviction --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LLM gateway ────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --detailed_debug
    env_file:
      - .env
    environment:
      - DISABLE_SCHEMA_UPDATE=true
      - STORE_MODEL_IN_DB=False
      - LITELLM_TELEMETRY=False
      - DATABASE_URL=
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── FastAPI API server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5000,http://localhost:5001,http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_started
    volumes:
      - ./backend:/app/backend:ro
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend

  # ── React frontend served by nginx ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_LAZY_PDF_IMPORT: ${VITE_LAZY_PDF_IMPORT:-false}
        VITE_ANON_SALT: ${VITE_ANON_SALT:-learnstation-analytics-2026}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  # ── Arq pipeline worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m arq backend.workers.arq_worker.WorkerSettings
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_started
    volumes:
      - ./backend:/app/backend:ro


volumes:
  redis_data:
  redis_queue_data:

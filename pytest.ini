[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider
markers =
    db: tests that require a running Postgres (nightly only)
    e2e: end-to-end browser tests (Playwright, run on label/nightly only)
    slow: tests that take > 1s
    contract: pydantic snapshot/contract tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

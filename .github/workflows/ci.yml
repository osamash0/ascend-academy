name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 03:17 UTC nightly — runs the DB / RLS suite against a real Postgres.
    # Off-the-hour to avoid the GitHub Actions hourly cron stampede.
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  lint:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: python -m pytest backend/tests --cov=backend --cov-report=html --cov-report=term -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: htmlcov/
          retention-days: 14

  e2e:
    name: E2E (Playwright)
    if: contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci --legacy-peer-deps
      - run: pip install -r backend/requirements.txt
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  nightly-db:
    name: DB / RLS tests (nightly only)
    # Runs nightly on the schedule trigger and on-demand via workflow_dispatch
    # so we can re-run after a migration change without waiting for 03:17.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      # Docker is preinstalled on ubuntu-latest runners; testcontainers will
      # find it at /var/run/docker.sock. No extra setup needed.
      - run: pip install -r backend/requirements.txt
      - name: Run DB / RLS tests
        run: python -m pytest backend/tests/db -m db -v --tb=short
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-db-logs
          path: |
            backend/tests/db/sql/
            supabase/migrations/
          retention-days: 14

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 03:17 UTC nightly — runs the DB / RLS suite against a real Postgres.
    # Off-the-hour to avoid the GitHub Actions hourly cron stampede.
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  lint:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - run: python -m pytest backend/tests --cov=backend --cov-report=html --cov-report=term -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: htmlcov/
          retention-days: 14

  e2e:
    name: E2E (Playwright)
    # Runs on all triggers (mandatory for PRs to main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci --legacy-peer-deps
      - run: pip install -r backend/requirements.txt
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  nightly-db:
    name: DB / RLS tests (nightly only)
    # Runs nightly on the schedule trigger and on-demand via workflow_dispatch
    # so we can re-run after a migration change without waiting for 03:17.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Docker is preinstalled on ubuntu-latest runners; testcontainers will
      # find it at /var/run/docker.sock. No extra setup needed.
      - run: pip install -r backend/requirements-dev.txt
      - name: Run DB / RLS tests
        run: python -m pytest backend/tests/db -m db -v --tb=short
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-db-logs
          path: |
            backend/tests/db/sql/
            supabase/migrations/
          retention-days: 14

  nightly-ai-eval:
    name: AI eval harness (nightly only)
    # Roadmap Foundation 10x P1-3: catches silent AI-quality regressions
    # (prompt changes, model swaps, provider failover) that nothing else in
    # CI would notice. Deliberately NOT run per-commit — it calls live
    # models, so it's slow/flaky/costly by nature; nightly is the right
    # cadence. Needs real provider keys configured as repo secrets to do a
    # real run; without them LivePipeline's calls fail and this job fails
    # loudly (not silently skips) so a missing-secret misconfiguration is
    # itself visible.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Run AI eval harness
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: make eval

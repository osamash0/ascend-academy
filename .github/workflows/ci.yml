name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 03:17 UTC nightly — runs the DB / RLS suite against a real Postgres.
    # Off-the-hour to avoid the GitHub Actions hourly cron stampede.
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  migration-lint:
    name: Migration governance (timestamp collisions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail on new duplicate migration timestamps
        run: python backend/scripts/check_migration_timestamps.py

  migration-lint-definer-grants:
    name: Migration lint (SECURITY DEFINER grant audit)
    # S-1 (docs/ROADMAP_10X_FOUNDATION.md §14): fails a PR that adds a new
    # SECURITY DEFINER function to supabase/migrations/ without an explicit
    # REVOKE/GRANT in the same file — Postgres grants EXECUTE to PUBLIC by
    # default, so an unguarded DEFINER function is reachable by the public
    # anon key over PostgREST. See docs/RPC_EXPOSURE_AUDIT.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Determine new/changed migration files
        id: changed
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          FILES=$(git diff --name-only --diff-filter=A "$BASE_REF"...HEAD -- 'supabase/migrations/*.sql' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Lint new migrations for unguarded SECURITY DEFINER functions
        if: steps.changed.outputs.files != ''
        run: python backend/scripts/lint_new_definer_functions.py ${{ steps.changed.outputs.files }}

  lint:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: ruff (report-only — 180 pre-existing violations, not yet gated)
        # TODO(P4-4 follow-up): fix or file the 180 pre-existing violations
        # (53 E402, 49 E701, 35 E741, 32 F401, 8 F841, 2 F811, 1 E731 as of
        # 2026-07-21) then flip this to blocking. Kept non-blocking for now so
        # CI is informative without breaking on day one.
        run: ruff check backend/ --statistics || true
      - run: python -m pytest backend/tests --cov=backend --cov-report=html --cov-report=term --cov-fail-under=70 -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: htmlcov/
          retention-days: 14

  e2e:
    name: E2E (Playwright)
    # Runs on all triggers (mandatory for PRs to main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci --legacy-peer-deps
      - run: pip install -r backend/requirements.txt
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  dependency-scan:
    name: Dependency vulnerability scan (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (backend)
        run: |
          pip install --quiet pip-audit
          # Fails the job on any known vulnerability in backend/requirements.txt.
          # Informational advisories with no fix available yet can be ignored
          # with `--ignore-vuln <id>` once triaged — do not blanket-suppress.
          pip-audit -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: npm audit (frontend)
        run: |
          npm ci --legacy-peer-deps
          # --audit-level=high: fail on high/critical only so low/moderate
          # advisories in transitive dev-tooling don't block every PR; revisit
          # if the project wants a stricter bar.
          npm audit --audit-level=high

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No paid GITLEAKS_LICENSE needed — the Action only requires a
          # license key for GitHub Enterprise Server; github.com repos run free.

  nightly-db:
    name: DB / RLS tests (nightly only)
    # Runs nightly on the schedule trigger and on-demand via workflow_dispatch
    # so we can re-run after a migration change without waiting for 03:17.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Docker is preinstalled on ubuntu-latest runners; testcontainers will
      # find it at /var/run/docker.sock. No extra setup needed.
      - run: pip install -r backend/requirements-dev.txt
      - name: Run DB / RLS tests
        run: python -m pytest backend/tests/db -m db -v --tb=short
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-db-logs
          path: |
            backend/tests/db/sql/
            supabase/migrations/
          retention-days: 14

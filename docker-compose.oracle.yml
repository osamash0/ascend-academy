name: ascend-academy-oracle

# Production stack for Oracle Cloud Free Tier (A1 Flex — ARM64 / aarch64).
# This is a SEPARATE file from docker-compose.prod.yml (university server, amd64).
# Do NOT modify docker-compose.prod.yml; use this file exclusively on the OCI VM.
#
# Target shape: VM.Standard.A1.Flex — 1 OCPU · 6 GB RAM
#
# Memory budget (hard limits below sum to ~1.9 GB):
#   redis        256 MB
#   redis-queue  160 MB  (durable Arq broker — noeviction + AOF)
#   litellm      512 MB
#   api          512 MB   ← uvicorn overridden to 1 worker (was 2 in Dockerfile)
#   worker       384 MB
#   frontend      64 MB  (nginx static files — very light)
#   ─────────────────
#   total       1888 MB  (~1.9 GB)
#   Ubuntu OS + Docker daemon: ~800 MB
#   headroom: ~3.5 GB free of 6 GB
#
# Usage:
#   docker compose -f docker-compose.oracle.yml up -d --build
#
# Differences from docker-compose.prod.yml:
#   - platform: linux/amd64 → linux/arm64  (OCI A1 is ARM)
#   - api CMD overridden: uvicorn --workers 2 → 1  (single OCPU)
#   - api memory:    512M  (unchanged, fits comfortably)
#   - worker memory: 512M → 384M  (trimmed for tighter headroom)
#   - litellm memory limit added: 512M  (was unlimited)
#   - project name: ascend-academy-oracle  (avoids collision with prod stack)

networks:
  ascend_net:
    driver: bridge

services:

  # ── App cache (evictable) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - ascend_net
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Job queue broker (durable) ────────────────────────────────────────────
  # Arq broker + results + parse SSE pub/sub. noeviction + AOF so queued parse
  # jobs are never dropped. Kept tiny (128 MB) — fits the 6 GB budget easily.
  redis-queue:
    image: redis:7-alpine
    networks:
      - ascend_net
    volumes:
      - redis_queue_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy noeviction --appendonly yes --loglevel warning
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 160M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LLM gateway ────────────────────────────────────────────────────────────
  # NOTE: LiteLLM is optional.
  # It acts as a gateway to external LLM providers (Groq, Gemini, OpenAI, etc.).
  # If you want to reduce memory pressure on this 6 GB VM, you can remove this
  # service and point LITELLM_BASE_URL directly to the provider's API in .env.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    # main-latest is a multi-arch manifest that includes arm64 — no platform pin needed.
    entrypoint: ["sh", "-c", "unset DATABASE_URL && exec docker/prod_entrypoint.sh \"$$@\"", "--"]
    networks:
      - ascend_net
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    env_file:
      - .env
    environment:
      - DISABLE_SCHEMA_UPDATE=true
      - STORE_MODEL_IN_DB=False
      - LITELLM_TELEMETRY=False
      - DATABASE_URL=
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── FastAPI API server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64   # OCI A1 Flex is ARM64 (aarch64)
    # Override Dockerfile CMD: drop to 1 uvicorn worker because this VM has 1 OCPU.
    # Running 2 workers on 1 core adds context-switching overhead with no throughput gain.
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
    networks:
      - ascend_net
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
      - ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      # Probe /health/ready — verifies DB + both Redis instances (returns 503
      # when a dependency is down). DB is only critical when DATABASE_URL is set.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend served by nginx ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_LAZY_PDF_IMPORT: ${VITE_LAZY_PDF_IMPORT:-false}
        VITE_ANON_SALT: ${VITE_ANON_SALT:-learnstation-analytics-2026}
    platform: linux/arm64   # OCI A1 Flex is ARM64 (aarch64)
    networks:
      - ascend_net
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      api:
        condition: service_healthy

  # ── Arq pipeline worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64   # OCI A1 Flex is ARM64 (aarch64)
    command: python -m arq backend.workers.arq_worker.WorkerSettings
    networks:
      - ascend_net
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_QUEUE_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - LITELLM_BASE_URL=http://litellm:4000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M   # trimmed from 512M to give headroom on 6 GB VM
    depends_on:
      redis:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      litellm:
        condition: service_started


volumes:
  redis_data:
  redis_queue_data:

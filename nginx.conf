server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for app (HTML/asset) responses. API responses get their own
    # equivalents from FastAPI's SecurityHeadersMiddleware. NOTE: nginx add_header is
    # NOT inherited by any location that defines its own add_header, so these are
    # re-declared in the index.html and hashed-asset blocks below.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Proxy /api/* to the backend, stripping the /api prefix.
    # e.g. GET /api/upload/slides → http://api:8000/upload/slides
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 100M;
    }

    # Ensure mjs files are served as javascript
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html so new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # Re-declare security headers (this block's add_header suppresses inherited ones)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Long-lived cache for hashed assets (JS/MJS/CSS chunks from Vite)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers (this block's add_header suppresses inherited ones)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
